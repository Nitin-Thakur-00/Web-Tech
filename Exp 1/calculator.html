<body>

    <h1>Scientific Calculator</h1>
    <p>Perform basic and scientific calculations below.</p>

    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <td colspan="5">
                <input type="text" id="display" style="width: 100%; height: 40px; font-size: 20px; text-align: right;"
                    readonly>
            </td>
        </tr>
        <tr>
            <td><button onclick="clearDisplay()" style="width: 100%; height: 40px;">C</button></td>
            <td><button onclick="appendValue('(')" style="width: 100%; height: 40px;">(</button></td>
            <td><button onclick="appendValue(')')" style="width: 100%; height: 40px;">)</button></td>
            <td><button onclick="backspace()" style="width: 100%; height: 40px;">BS</button></td>
            <td><button onclick="appendValue('/')" style="width: 100%; height: 40px;">/</button></td>
        </tr>
        <tr>
            <td><button onclick="scientific('sin')" style="width: 100%; height: 40px;">sin</button></td>
            <td><button onclick="appendValue('7')" style="width: 100%; height: 40px;">7</button></td>
            <td><button onclick="appendValue('8')" style="width: 100%; height: 40px;">8</button></td>
            <td><button onclick="appendValue('9')" style="width: 100%; height: 40px;">9</button></td>
            <td><button onclick="appendValue('*')" style="width: 100%; height: 40px;">*</button></td>
        </tr>
        <tr>
            <td><button onclick="scientific('cos')" style="width: 100%; height: 40px;">cos</button></td>
            <td><button onclick="appendValue('4')" style="width: 100%; height: 40px;">4</button></td>
            <td><button onclick="appendValue('5')" style="width: 100%; height: 40px;">5</button></td>
            <td><button onclick="appendValue('6')" style="width: 100%; height: 40px;">6</button></td>
            <td><button onclick="appendValue('-')" style="width: 100%; height: 40px;">-</button></td>
        </tr>
        <tr>
            <td><button onclick="scientific('tan')" style="width: 100%; height: 40px;">tan</button></td>
            <td><button onclick="appendValue('1')" style="width: 100%; height: 40px;">1</button></td>
            <td><button onclick="appendValue('2')" style="width: 100%; height: 40px;">2</button></td>
            <td><button onclick="appendValue('3')" style="width: 100%; height: 40px;">3</button></td>
            <td><button onclick="appendValue('+')" style="width: 100%; height: 40px;">+</button></td>
        </tr>
        <tr>
            <td><button onclick="scientific('sqrt')" style="width: 100%; height: 40px;">&radic;</button></td>
            <td><button onclick="appendValue('0')" style="width: 100%; height: 40px;">0</button></td>
            <td><button onclick="appendValue('.')" style="width: 100%; height: 40px;">.</button></td>
            <td><button onclick="appendValue('Math.PI')" style="width: 100%; height: 40px;">&pi;</button></td>
            <td><button onclick="calculate()" style="width: 100%; height: 40px; background-color: #ddd;">=</button></td>
        </tr>
        <tr>
            <td><button onclick="scientific('log')" style="width: 100%; height: 40px;">log</button></td>
            <td><button onclick="scientific('exp')" style="width: 100%; height: 40px;">exp</button></td>
            <td><button onclick="appendValue('**')" style="width: 100%; height: 40px;">^</button></td>
            <td><button onclick="appendValue('Math.E')" style="width: 100%; height: 40px;">e</button></td>
            <td><button onclick="scientific('ln')" style="width: 100%; height: 40px;">ln</button></td>
        </tr>
    </table>

    <script>
        const display = document.getElementById('display');

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                // Using eval for simplicity in this exercise, but acknowledging it's usually not recommended
                display.value = eval(display.value);
            } catch (e) {
                display.value = 'Error';
            }
        }

        function scientific(func) {
            try {
                let val = parseFloat(display.value);
                if (isNaN(val)) {
                    // Try evaluating what's there first
                    val = eval(display.value);
                }

                let result;
                switch (func) {
                    case 'sin': result = Math.sin(val); break;
                    case 'cos': result = Math.cos(val); break;
                    case 'tan': result = Math.tan(val); break;
                    case 'sqrt': result = Math.sqrt(val); break;
                    case 'log': result = Math.log10(val); break;
                    case 'ln': result = Math.log(val); break;
                    case 'exp': result = Math.exp(val); break;
                    default: result = "Error";
                }
                display.value = result;
            } catch (e) {
                display.value = 'Error';
            }
        }
    </script>
</body>

</html>

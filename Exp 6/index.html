<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideathon 2026 Registration</title>
    <link rel="stylesheet" href="ideathon_css.css">
</head>
<body>

    <h2>Ideathon 2026 Registration</h2>
    
    <form id="regForm">
        <div class="section">
            <label><strong>Team Size:</strong></label>
            <div class="radio-group">
                <label><input type="radio" name="teamSize" value="1" onclick="adjustFields(1)" checked> 1</label>
                <label><input type="radio" name="teamSize" value="2" onclick="adjustFields(2)"> 2</label>
                <label><input type="radio" name="teamSize" value="3" onclick="adjustFields(3)"> 3</label>
                <label><input type="radio" name="teamSize" value="4" onclick="adjustFields(4)"> 4</label>
            </div>
        </div>

        <div id="memberFields">
            <label>Member 1 Name:</label>
            <input type="text" class="memberName" placeholder="Full Name">
        </div>

        <label>Leader Email:</label>
        <input type="email" id="email" placeholder="leader@gmail.com">

        <label>Contact Number:</label>
        <input type="tel" id="phone" placeholder="+91 8567898754">

        <label><strong>Project Domain:</strong></label>
        <div class="check-group">
            <label><input type="checkbox" name="domain" value="Cybersecurity"> Cybersecurity</label>
            <label><input type="checkbox" name="domain" value="Web Dev"> Web Development</label>
            <label><input type="checkbox" name="domain" value="App Dev"> App Development</label>
        </div>

        <label><strong>Project Brief:</strong></label>
        <textarea id="idea" placeholder="Briefly describe your innovative project..."></textarea>

        <label>Upload PPT/PDF:</label>
        <div class="file-container">
            <label for="pptFile" class="custom-file-upload">
                <span id="file-label-text">Click to select PPT or PDF</span>
            </label>
            <input type="file" id="pptFile" onchange="updateFileName()">
            <div id="file-name-display" class="file-name-text">No file chosen</div>
        </div>

        <button type="button" onclick="displayRegistration()">Register Team</button>
    </form>

    <hr>

    <div id="displayArea">
        <p>Awaiting registration...</p>
    </div>

    <script>
        // Update file name display
        function updateFileName() {
            const input = document.getElementById('pptFile');
            const display = document.getElementById('file-name-display');
            display.innerText = input.files[0] ? `Selected: ${input.files[0].name}` : "No file chosen";
        }

        // Dynamic fields for members
        function adjustFields(size) {
            const container = document.getElementById('memberFields');
            container.innerHTML = ""; 
            for (let i = 1; i <= size; i++) {
                container.innerHTML += `
                    <label>Member ${i} Name:</label>
                    <input type="text" class="memberName" placeholder="Full Name">
                `;
            }
        }

        // Submission logic
        function displayRegistration() {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const idea = document.getElementById('idea').value;
            
            const ppt = document.getElementById('pptFile').files[0];
            const pptName = ppt ? ppt.name : "No file uploaded";

            const nameInputs = document.querySelectorAll('.memberName');
            let names = [];
            nameInputs.forEach(input => {
                if(input.value) names.push(input.value);
            });

            const domainBoxes = document.querySelectorAll('input[name="domain"]:checked');
            let domains = [];
            domainBoxes.forEach(box => domains.push(box.value));

            if (names.length === 0 || !email) {
                alert("Please fill in at least the leader's name and email!");
                return;
            }

            alert("Registration Complete!");

            const output = document.getElementById('displayArea');
            output.innerHTML = `
                <h3>Submission Recorded</h3>
                <div class="data-row"><strong>Team:</strong> ${names.join(', ')}</div>
                <div class="data-row"><strong>Contact:</strong> ${email} | ${phone}</div>
                <div class="data-row"><strong>Domains:</strong> ${domains.join(', ') || 'None'}</div>
                <div class="data-row"><strong>Brief:</strong> ${idea}</div>
                <div class="data-row"><strong>File:</strong> ${pptName}</div>
            `;
            
            output.style.display = "block";
            output.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

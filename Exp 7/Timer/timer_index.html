<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="timer_css.css">
</head>
<body>

    <div class="timer-container">
        <h1>Timer</h1>
        
        <div id="time-display" class="glass-display">00 : 00</div>

        <div class="control-module">
            <label for="user-input">Set Duration</label><br>
            <div class="input-wrapper">
                <input type="number" id="user-input" placeholder="000" min="1">
            </div>
        </div>

        <div class="button-group">
            <button class="btn start" onclick="startTimer()">Start</button>
            <button class="btn stop" onclick="stopTimer()">Stop</button>
            <button class="btn reset" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <script src="timer_js.js"></script>
</body>
</html>
